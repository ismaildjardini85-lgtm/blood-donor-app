<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Gestion des Donneurs de Sang CTS AIN SEFRA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background: #f7f7fa; margin: 0; padding: 0; }
      .container { max-width: 700px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px #0001; padding: 32px; }
        .blood-drop {
          display: flex;
          justify-content: center;
          margin-bottom: 10px;
        }
        .blood-drop svg {
          width: 60px;
          height: 80px;
          display: block;
        }
      h1 { text-align: center; color: #d32f2f; }
      form label { display: block; margin: 12px 0 6px; font-weight: 500; }
      form input, form select { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 1em; }
      button[type="submit"] { background: #d32f2f; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; font-size: 1em; cursor: pointer; margin-top: 10px; }
      button[type="submit"]:hover { background: #b71c1c; }
      table { width: 100%; border-collapse: collapse; margin-top: 24px; }
      th, td { padding: 10px; border: 1px solid #eee; text-align: center; }
        th { background: linear-gradient(90deg, #ff5252 60%, #d32f2f 100%); color: #fff; }
      #donorsList h2 { margin-top: 32px; color: #333; }
    </style>
  </head>
  <body>
    <div class="container">
        <div class="blood-drop">
          <svg viewBox="0 0 60 80" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="goutte" cx="50%" cy="60%" r="60%">
                <stop offset="0%" stop-color="#ffb3b3"/>
                <stop offset="100%" stop-color="#d32f2f"/>
              </radialGradient>
            </defs>
            <path d="M30 5 C30 5, 55 40, 30 75 C5 40, 30 5, 30 5 Z" fill="url(#goutte)" stroke="#b71c1c" stroke-width="2"/>
            <ellipse cx="30" cy="60" rx="13" ry="8" fill="#fff6f6" opacity="0.7"/>
          </svg>
        </div>
      <h1>Gestion des Donneurs de Sang CTS AIN SEFRA</h1>
      <form id="donorForm">
        <label>Numéro du sac: <input type="text" id="bagNumber" required></label>
        <label>Nom complet: <input type="text" id="name" required></label>
        <label>Date de naissance: <input type="date" id="birthDate" required></label>
        <label>Téléphone: <input type="text" id="phone" required></label>
        <label>Adresse: <input type="text" id="address" required></label>
        <label>Date du don: <input type="date" id="donationDate" required></label>
        <label>Groupe sanguin:
          <select id="bloodType" required>
            <option value="">Choisir</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </label>
        <label>Patient: <input type="text" id="patient"></label>
        <button type="submit">Ajouter Donneur</button>
      </form>
      <div style="margin: 24px 0 0 0;">
        <input type="text" id="searchInput" placeholder="Rechercher par nom, groupe sanguin, numéro du sac, téléphone..." style="width:100%;padding:8px;border-radius:5px;border:1px solid #ccc;font-size:1em;">
        <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;">
          <button id="showStatsBtn" style="background:#1976d2;color:#fff;border:none;padding:10px 16px;border-radius:6px;font-size:0.9em;cursor:pointer;flex:1;min-width:120px;">📊 إحصائيات</button>
          <button onclick="exportToCSV()" style="background:#4caf50;color:#fff;border:none;padding:10px 16px;border-radius:6px;font-size:0.9em;cursor:pointer;flex:1;min-width:120px;">📥 تصدير CSV</button>
          <button onclick="exportToJSON()" style="background:#4caf50;color:#fff;border:none;padding:10px 16px;border-radius:6px;font-size:0.9em;cursor:pointer;flex:1;min-width:120px;">📥 تصدير JSON</button>
          <button onclick="importData()" style="background:#2196f3;color:#fff;border:none;padding:10px 16px;border-radius:6px;font-size:0.9em;cursor:pointer;flex:1;min-width:120px;">📤 استيراد</button>
          <button onclick="clearAllData()" style="background:#ff9800;color:#fff;border:none;padding:10px 16px;border-radius:6px;font-size:0.9em;cursor:pointer;flex:1;min-width:120px;">🗑️ حذف الكل</button>
        </div>
        <div id="statsModal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.4);z-index:1000;justify-content:center;align-items:center;">
          <div style="background:#fff;padding:32px 24px;border-radius:12px;max-width:600px;width:90%;box-shadow:0 2px 16px #0003;position:relative;">
            <button id="closeStats" style="position:absolute;top:12px;right:12px;background:#e53935;color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:1.2em;cursor:pointer;">&times;</button>
            <h2 style="text-align:center;color:#1976d2;">إحصائيات التبرع</h2>
            <div id="statsContent"></div>
          </div>
        </div>
      </div>
      <div id="donorsList">
        <h2>Liste des donneurs</h2>
        <table id="donorsTable">
          <thead>
            <tr>
              <th>Numéro du sac</th>
              <th>Nom complet</th>
              <th>Date de naissance</th>
              <th>Téléphone</th>
              <th>Adresse</th>
              <th>Date du don</th>
              <th>Groupe sanguin</th>
              <th>Patient</th>
              <th>Supprimer</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database.js"></script>
    <script src="config.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
